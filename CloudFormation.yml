AWSTemplateFormatVersion: '2010-09-09'
Description: 'VPC Infrastructure - Frankfurt - Practice'

Parameters:

  InstanceType:
    Type: String
    Default: t2.micro
    AllowedValues:
      - t2.micro
      - t3.micro
    Description: 'EC2 instance type - keep t2.micro for free tier'

Resources:

  # ─── VPC ───────────────────────────────────────────────────────────
  MyVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: practice-vpc

  # ─── INTERNET GATEWAY ──────────────────────────────────────────────
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: practice-igw

  AttachIGW:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref MyVPC
      InternetGatewayId: !Ref InternetGateway

  # ─── SUBNETS ───────────────────────────────────────────────────────
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: eu-central-1a
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: public-subnet-1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: 10.0.4.0/24
      AvailabilityZone: eu-central-1b
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: public-subnet-2

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: eu-central-1a
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: private-subnet-1

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: 10.0.5.0/24
      AvailabilityZone: eu-central-1b
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: private-subnet-2

  DatabaseSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: 10.0.3.0/24
      AvailabilityZone: eu-central-1a
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: database-subnet-1

  DatabaseSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: 10.0.6.0/24
      AvailabilityZone: eu-central-1b
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: database-subnet-2

  # ─── ELASTIC IP + NAT GATEWAY ──────────────────────────────────────
  NatEIP:
    Type: AWS::EC2::EIP
    DependsOn: AttachIGW
    Properties:
      Domain: vpc

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEIP.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: practice-nat

  # ─── ROUTE TABLES ──────────────────────────────────────────────────
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref MyVPC
      Tags:
        - Key: Name
          Value: public-rt

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachIGW
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RTA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RTA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref MyVPC
      Tags:
        - Key: Name
          Value: private-rt

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnet1RTA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RTA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  DatabaseRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref MyVPC
      Tags:
        - Key: Name
          Value: database-rt

  DatabaseSubnet1RTA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref DatabaseSubnet1
      RouteTableId: !Ref DatabaseRouteTable

  DatabaseSubnet2RTA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref DatabaseSubnet2
      RouteTableId: !Ref DatabaseRouteTable

  # ─── SECURITY GROUPS ───────────────────────────────────────────────
  PublicSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Public EC2 - HTTP and HTTPS only'
      VpcId: !Ref MyVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: public-sg

  PrivateSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Private EC2 - traffic from public sg only'
      VpcId: !Ref MyVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref PublicSG
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref PublicSG
      Tags:
        - Key: Name
          Value: private-sg

  DatabaseSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Database EC2 - DB port from private sg only'
      VpcId: !Ref MyVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref PrivateSG
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref PrivateSG
      Tags:
        - Key: Name
          Value: database-sg

  # ─── EC2 INSTANCES ─────────────────────────────────────────────────
  PublicEC2AZ1:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      SubnetId: !Ref PublicSubnet1
      SecurityGroupIds:
        - !Ref PublicSG
      ImageId: ami-0faab6bdbac9486fb
      Tags:
        - Key: Name
          Value: public-ec2-az1

  PublicEC2AZ2:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      SubnetId: !Ref PublicSubnet2
      SecurityGroupIds:
        - !Ref PublicSG
      ImageId: ami-0faab6bdbac9486fb
      Tags:
        - Key: Name
          Value: public-ec2-az2

  PrivateEC2AZ1:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      SubnetId: !Ref PrivateSubnet1
      SecurityGroupIds:
        - !Ref PrivateSG
      ImageId: ami-0faab6bdbac9486fb
      Tags:
        - Key: Name
          Value: private-ec2-az1

  PrivateEC2AZ2:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      SubnetId: !Ref PrivateSubnet2
      SecurityGroupIds:
        - !Ref PrivateSG
      ImageId: ami-0faab6bdbac9486fb
      Tags:
        - Key: Name
          Value: private-ec2-az2

  DatabaseEC2AZ1:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      SubnetId: !Ref DatabaseSubnet1
      SecurityGroupIds:
        - !Ref DatabaseSG
      ImageId: ami-0faab6bdbac9486fb
      Tags:
        - Key: Name
          Value: database-ec2-az1

  DatabaseEC2AZ2:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      SubnetId: !Ref DatabaseSubnet2
      SecurityGroupIds:
        - !Ref DatabaseSG
      ImageId: ami-0faab6bdbac9486fb
      Tags:
        - Key: Name
          Value: database-ec2-az2

Outputs:
  VPCId:
    Description: 'VPC ID'
    Value: !Ref MyVPC

  NatGatewayId:
    Description: 'NAT Gateway Elastic IP'
    Value: !Ref NatEIP

  PublicEC2AZ1IP:
    Description: 'Public EC2 AZ1 IP'
    Value: !GetAtt PublicEC2AZ1.PublicIp

  PublicEC2AZ2IP:
    Description: 'Public EC2 AZ2 Public IP'
    Value: !GetAtt PublicEC2AZ2.PublicIp

  PrivateEC2AZ1IP:
    Description: 'Private EC2 AZ1 Private IP'
    Value: !GetAtt PrivateEC2AZ1.PrivateIp

  PrivateEC2AZ2IP:
    Description: 'Private EC2 AZ2 Private IP'
    Value: !GetAtt PrivateEC2AZ2.PrivateIp

  DatabaseEC2AZ1IP:
    Description: 'Database EC2 AZ1 Private IP'
    Value: !GetAtt DatabaseEC2AZ1.PrivateIp
  
  DatabaseEC2AZ2IP:
    Description: 'Database EC2 AZ2 Private IP'
    Value: !GetAtt DatabaseEC2AZ2.PrivateIp
  
