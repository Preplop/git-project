# GutHub Actions - by Giorgi Kutsia - my-basics
name: MyGitHubActions-basics-giorgikutsia
env:
  APPLICATION_NAME: "MyFlask"
  DEPLOY_PACKAGE_NAME    : "flask-deploy-version-${{ github.sha }}"

on:
  push:
    branches: 
      - main

jobs:
  my_testing:
    runs-on: ubuntu-latest
    steps:
    - name: Print Hello World
      run: echo "Hello World from testing"
    - name: Run a multi-line script
      run: |
        echo Add other actions build,
        echo test and deploy my Project.
    - name: Execute few commands
      run: |
        echo "Hello Message 1"
        echo "Hello Message 2"
        echo "Application name - ${{ env.APPLICATION_NAME }}"
        
  my_deploy:
    runs-on: ubuntu-latest
    needs: [my_testing]
    steps:
      - name: Print Hello World
        run: echo "Hello World from deploy"
      - name: Execute few commands
        run: echo "Application name - ${{ env.DEPLOY_PACKAGE_NAME }}"
