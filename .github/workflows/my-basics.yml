# GutHub Actions - by Giorgi Kutsia - my-basics
name: MyGitHubActions-basics-giorgikutsia
env:
  APPLICATION_NAME: "MyFlask"
  DEPLOY_PACKAGE_NAME    : "flask-deploy-version-${{ github.sha }}"

on:
  push:
    branches: 
      - main

jobs:
  my_testing:
    runs-on: ubuntu-latest
    steps:
    - name: Print Hello World
      run: echo "Hello World from testing"
    - name: Run a multi-line script
      run: |
        echo Add other actions build,
        echo test and deploy my Project.
    - name: Execute few commands
      run: |
        echo "Hello Message 1"
        echo "Hello Message 2"
        echo "Application name - ${{ env.APPLICATION_NAME }}"
    - name: Git clone my repo
      uses: actions/checkout@v1
    - name: List current folder
      run: ls -la
        
  my_deploy:
    runs-on: ubuntu-latest
    needs: [my_testing]
    env:
      VAR1: "This is Job-level Variable-1"
      VAR2: "This is Job-level Variable-2"
    steps:
      - name: Print Hello World
        run: echo "Hello World from deploy"
      - name: Print env vars
        run: |
          echo "Var1 = ${{ env.VAR1}}"
          echo "VAR2 = ${{ env.VAR2}}"
          echo "VAR3 = $LOCALVAR"
        env:
          LOCAL_VAR: "This is Superr local ENvironment variable"
      
      - name: Execute few commands
        run: echo "Application name - ${{ env.DEPLOY_PACKAGE_NAME }}"
      - name: lets test some packages if they are here 1
        run: aws --version
      - name: lets test some packages if they are here 2
        run: zip
